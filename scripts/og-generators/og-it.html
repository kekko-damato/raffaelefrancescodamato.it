<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>OG Image Generator (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #444; padding: 0; }
  .og {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #f6f1e8 0%, #ede4d4 100%);
    color: #1a1a1a;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .og::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(140, 90, 43, 0.22), transparent 65%);
    border-radius: 50%; filter: blur(40px);
  }
  .og::after {
    content: ''; position: absolute; bottom: -80px; left: 60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(196, 168, 120, 0.25), transparent 70%);
    border-radius: 50%; filter: blur(30px);
  }
  .og > * { position: relative; z-index: 1; }
  .og-top {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 16px; letter-spacing: 3px; text-transform: uppercase;
    color: #8c5a2b; font-weight: 600;
  }
  .og-title {
    font-family: 'Playfair Display', serif;
    font-size: 130px; line-height: 0.95; letter-spacing: -3px;
    font-weight: 400;
  }
  .og-title em { font-style: italic; color: #8c5a2b; font-weight: 400; }
  .og-bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    font-family: 'Inter', sans-serif;
  }
  .og-role-line { width: 56px; height: 2px; background: #8c5a2b; margin-bottom: 16px; }
  .og-role {
    font-size: 26px; font-weight: 500;
    letter-spacing: 0.5px; color: #1a1a1a;
  }
  .og-domain {
    font-size: 16px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #5a5a5a; font-weight: 600;
  }
</style>
</head>
<body>
<div class="og" id="og-it">
  <div class="og-top">
    <span>Vol. 01 · Edition 2026</span>
    <span>Portfolio</span>
  </div>
  <h1 class="og-title">Raffaele Francesco<br/><em>D&rsquo;Amato</em></h1>
  <div class="og-bottom">
    <div>
      <div class="og-role-line"></div>
      <div class="og-role">AI Developer &amp; Founder · Automation Builder</div>
    </div>
    <div class="og-domain">raffaelefrancescodamato.it</div>
  </div>
</div>
</body>
</html>
